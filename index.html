<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>소득분위 계산기 | 청약 자격 판독기</title>
    <meta name="description" content="슬라이더 한 번으로 청약 소득분위 즉시 확인. 신혼부부·생애최초·공공분양 자격 판독.">
    <style>
        @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2'); font-weight: 400; }
        @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Bold.woff2') format('woff2'); font-weight: 700; }

        :root {
            --bg: #FAFAFA;
            --surface: #FFFFFF;
            --surface-2: #F5F5F7;
            --text: #111113;
            --text-2: #6E6E73;
            --text-3: #AEAEB2;
            --accent: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --border: #F0F0F2;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'SF Pro', 'Helvetica Neue', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding: 20px 16px 48px; color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 420px; }

        /* Hero greeting */
        .hero { padding: 12px 4px 20px; }
        .hero h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; margin: 0 0 6px; line-height: 1.25; }
        .hero p { font-size: 15px; color: var(--text-2); margin: 0; letter-spacing: -0.2px; }

        /* Card */
        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
            margin-bottom: 12px;
        }
        .label { font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 10px; letter-spacing: -0.2px; }
        .caption { font-size: 12px; color: var(--text-3); letter-spacing: -0.1px; }

        /* Result card */
        .result-card .display { font-size: 56px; font-weight: 700; color: var(--text); letter-spacing: -2.5px; line-height: 1; margin: 2px 0 2px -2px; }
        .result-card .display .percent-sign { font-size: 36px; color: var(--text-2); margin-left: 2px; letter-spacing: -1px; }
        .result-card .amount { font-size: 15px; color: var(--text-2); font-weight: 500; margin-bottom: 20px; letter-spacing: -0.2px; }
        .result-card .amount .dot { color: var(--text-3); margin: 0 6px; }
        .eligibility-list { display: flex; flex-direction: column; }
        .eligibility-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-top: 1px solid var(--border); }
        .eligibility-row .name { font-size: 15px; font-weight: 500; color: var(--text); letter-spacing: -0.2px; }
        .eligibility-row .name small { color: var(--text-3); font-size: 12px; font-weight: 500; margin-left: 6px; letter-spacing: 0; }
        .eligibility-row .mark { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
        .mark.ok { color: var(--success); }
        .mark.ng { color: var(--text-3); }
        .caveat { margin-top: 16px; padding: 12px 14px; background: var(--surface-2); border-radius: var(--radius-md); font-size: 12px; color: var(--text-2); line-height: 1.55; letter-spacing: -0.2px; }

        /* Chips (family + region) */
        .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .chip {
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: -0.2px;
        }
        .chip:hover { background: var(--surface-2); }
        .chip.active { background: var(--text); color: white; border-color: var(--text); }

        /* Slider */
        .slider-wrapper { padding-top: 4px; }
        .slider-amount { font-size: 26px; font-weight: 700; text-align: center; margin-bottom: 14px; letter-spacing: -1px; color: var(--text); }
        .slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: linear-gradient(to right, var(--surface-2) 0%, var(--surface-2) 100%);
            border-radius: 999px;
            outline: none;
            margin: 10px 0 8px;
            cursor: pointer;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid white;
            box-shadow: 0 2px 10px rgba(0, 122, 255, 0.35);
            transition: transform 0.1s ease;
        }
        .slider::-webkit-slider-thumb:active { transform: scale(1.1); }
        .slider::-moz-range-thumb {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid white;
            box-shadow: 0 2px 10px rgba(0, 122, 255, 0.35);
        }
        .slider-marks { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-3); margin-top: 8px; padding: 0 2px; font-weight: 500; letter-spacing: -0.1px; }
        .hint { font-size: 12px; color: var(--text-3); margin-top: 14px; text-align: center; letter-spacing: -0.2px; }

        /* Section header row */
        .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px; }
        .section-head .label { margin: 0; }
        .toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); cursor: pointer; user-select: none; letter-spacing: -0.2px; }
        .toggle input { margin: 0; accent-color: var(--accent); }

        /* Announcement list */
        .announcement-list { display: flex; flex-direction: column; gap: 10px; }
        .announcement-item {
            padding: 14px;
            background: var(--surface-2);
            border-radius: var(--radius-md);
        }
        .announcement-item.expired { opacity: 0.55; }
        .announcement-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
        .announcement-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; letter-spacing: -0.3px; flex: 1; }
        .announcement-title small { color: var(--text-3); font-size: 12px; font-weight: 500; margin-left: 4px; display: block; margin-top: 2px; letter-spacing: -0.1px; }
        .announcement-meta { font-size: 12px; color: var(--text-2); line-height: 1.65; letter-spacing: -0.2px; }
        .announcement-meta .line { margin-top: 2px; }

        /* Badges */
        .badge-group { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; flex-shrink: 0; }
        .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; letter-spacing: -0.1px; }
        .badge.ongoing { background: rgba(52, 199, 89, 0.13); color: var(--success); }
        .badge.upcoming { background: rgba(0, 122, 255, 0.12); color: var(--accent); }
        .badge.expired { background: #EDEDEF; color: var(--text-3); }
        .badge.analyzed { background: rgba(0, 122, 255, 0.12); color: var(--accent); }
        .badge.estimated { background: var(--surface); color: var(--text-3); border: 1px solid var(--border); }

        /* Loading/empty */
        .loading, .empty { text-align: center; padding: 24px 12px; color: var(--text-3); font-size: 13px; letter-spacing: -0.2px; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-radius: 50%; border-top-color: var(--accent); animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: -2px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">

    <!-- 1. Hero Greeting -->
    <section class="hero">
        <h1>안녕하세요 👋</h1>
        <p>우리 집은 소득 몇 %?</p>
    </section>

    <!-- 2. Result Card (always visible, live updates) -->
    <section class="card result-card">
        <div class="label">우리 집 소득 분위</div>
        <div class="display"><span id="resultPercent">100</span><span class="percent-sign">%</span></div>
        <div class="amount"><span id="resultAmount">월 596만원</span><span class="dot">·</span><span>도시근로자 평균 대비</span></div>
        <div class="eligibility-list" id="eligibilityList"></div>
        <div class="caveat">⚠️ 일반 기준 추정값입니다. 공고마다 실제 소득·자산 기준이 다를 수 있어요.</div>
    </section>

    <!-- 3. Input Card -->
    <section class="card">
        <div class="label">가구원 수</div>
        <div class="chip-row" id="familyChips" style="margin-bottom: 18px;">
            <button type="button" class="chip" data-family="1">1인</button>
            <button type="button" class="chip active" data-family="2">2인</button>
            <button type="button" class="chip" data-family="3">3인</button>
            <button type="button" class="chip" data-family="4">4인</button>
            <button type="button" class="chip" data-family="5">5인</button>
        </div>
        <div class="label">월 소득</div>
        <div class="slider-wrapper">
            <div class="slider-amount" id="sliderAmount">월 596만원</div>
            <input type="range" class="slider" id="incomeSlider">
            <div class="slider-marks">
                <span>50%</span>
                <span>평균 100%</span>
                <span>250%</span>
            </div>
            <div class="hint">💡 성과급 포함 연봉 ÷ 12 로 입력하세요</div>
        </div>
    </section>

    <!-- 4. Hot Announcements (moved below result) -->
    <section class="card">
        <div class="section-head">
            <div class="label">🔥 핫한 단지</div>
            <span class="caption" id="hotCount"></span>
        </div>
        <div id="hotList" class="announcement-list">
            <div class="loading"><span class="spinner"></span>불러오는 중...</div>
        </div>
    </section>

    <!-- 5. All Announcements -->
    <section class="card">
        <div class="section-head">
            <div class="label">진행 중인 공고</div>
            <label class="toggle"><input type="checkbox" id="showExpiredToggle"> 마감 포함</label>
        </div>
        <div class="chip-row" id="regionChips" style="margin-bottom: 12px;">
            <button type="button" class="chip active" data-region="all">전체</button>
            <button type="button" class="chip" data-region="seoul">서울</button>
            <button type="button" class="chip" data-region="gyeonggi">경기</button>
            <button type="button" class="chip" data-region="other">이외</button>
        </div>
        <div class="caption" id="allCount" style="margin-bottom: 10px;"></div>
        <div id="allList" class="announcement-list">
            <div class="loading"><span class="spinner"></span>불러오는 중...</div>
        </div>
    </section>

</div>

<script>
    // ---------- State ----------
    // 2024년 도시근로자 월평균소득 (100% 기준)
    const incomeStd = { 1: 3350847, 2: 5959606, 3: 7003509, 4: 8248467, 5: 8775071 };
    let familyCount = 2;
    let monthlyIncome = Math.round(incomeStd[2] / 10000); // 만원
    let activeRegion = 'all';
    let showExpired = false;
    let allAnnouncements = [];
    let criteria = { announcements: {} };

    // ---------- Date utilities ----------
    function parseYmd(s) {
        if (!/^\d{8}$/.test(s || '')) return null;
        const y = +s.slice(0, 4), m = +s.slice(4, 6) - 1, d = +s.slice(6, 8);
        const dt = new Date(y, m, d);
        return (dt.getFullYear() === y && dt.getMonth() === m && dt.getDate() === d) ? dt : null;
    }

    function fmtDate(s) {
        const dt = parseYmd(s);
        if (!dt) return '미정';
        return `${dt.getFullYear()}.${String(dt.getMonth() + 1).padStart(2, '0')}.${String(dt.getDate()).padStart(2, '0')}`;
    }

    function statusFor(startStr, endStr) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const s = parseYmd(startStr), e = parseYmd(endStr);
        if (!s || !e) return { label: '일정 미정', tone: 'expired', rank: 3 };
        if (today < s) {
            const d = Math.ceil((s - today) / 86400000);
            return { label: `D-${d}`, tone: 'upcoming', rank: 1 };
        }
        if (today <= e) return { label: '청약중', tone: 'ongoing', rank: 0 };
        return { label: '마감', tone: 'expired', rank: 2, expired: true };
    }

    // ---------- Family chip ----------
    function setFamily(n) {
        familyCount = +n;
        document.querySelectorAll('#familyChips .chip').forEach(c =>
            c.classList.toggle('active', +c.dataset.family === familyCount));
        setupSlider();
        recompute();
    }

    // ---------- Slider ----------
    function setupSlider() {
        const base = Math.round(incomeStd[familyCount] / 10000);
        const min = Math.round(base * 0.5);
        const max = Math.round(base * 2.5);
        const slider = document.getElementById('incomeSlider');
        slider.min = min;
        slider.max = max;
        slider.step = 10;
        // 가구원 변경 시 평균값으로 리셋 (더 직관적)
        monthlyIncome = base;
        slider.value = monthlyIncome;
        updateSliderTrack(slider);
    }

    function updateSliderTrack(slider) {
        const min = +slider.min, max = +slider.max, val = +slider.value;
        const pct = ((val - min) / (max - min)) * 100;
        slider.style.background = `linear-gradient(to right, var(--accent) 0%, var(--accent) ${pct}%, var(--surface-2) ${pct}%, var(--surface-2) 100%)`;
    }

    function onSliderInput(e) {
        monthlyIncome = +e.target.value;
        updateSliderTrack(e.target);
        recompute();
    }

    // ---------- Recompute (live) ----------
    function recompute() {
        const totalKrw = monthlyIncome * 10000;
        const percent = Math.round((totalKrw / incomeStd[familyCount]) * 100);
        document.getElementById('resultPercent').textContent = percent;
        const amountText = `월 ${monthlyIncome.toLocaleString()}만원`;
        document.getElementById('resultAmount').textContent = amountText;
        document.getElementById('sliderAmount').textContent = amountText;

        const rows = [
            { name: '신혼부부 외벌이', sub: '140% 이하', limit: 140 },
            { name: '신혼부부 맞벌이', sub: '160% 이하', limit: 160 },
            { name: '생애최초 특별공급', sub: '160% 이하', limit: 160 },
            { name: '공공분양 일반공급', sub: '100% 이하', limit: 100 },
            { name: '신생아 특례', sub: '200% 이하', limit: 200 },
        ];
        const html = rows.map(r => {
            const ok = percent <= r.limit;
            return `<div class="eligibility-row">
                <div class="name">${r.name}<small>${r.sub}</small></div>
                <div class="mark ${ok ? 'ok' : 'ng'}">${ok ? '✓ 가능' : '초과'}</div>
            </div>`;
        }).join('');
        document.getElementById('eligibilityList').innerHTML = html;
    }

    // ---------- Region ----------
    function setRegion(r) {
        activeRegion = r;
        document.querySelectorAll('#regionChips .chip').forEach(c =>
            c.classList.toggle('active', c.dataset.region === r));
        renderAll();
    }

    function filterByRegion(list, region) {
        if (region === 'all') return list;
        if (region === 'seoul') return list.filter(a => a.region === '서울');
        if (region === 'gyeonggi') return list.filter(a => a.region === '경기');
        if (region === 'other') return list.filter(a => a.region !== '서울' && a.region !== '경기');
        return list;
    }

    // ---------- Announcement rendering ----------
    function announcementItem(item) {
        const status = statusFor(item.applicationStart, item.applicationEnd);
        const c = criteria.announcements?.[item.id];
        const analyzedBadge = c
            ? '<span class="badge analyzed">✓ 분석됨</span>'
            : '<span class="badge estimated">일반 기준 추정</span>';
        const statusBadge = `<span class="badge ${status.tone}">${status.label}</span>`;

        let incomeLine;
        if (c && c.incomeStandards) {
            const parts = Object.entries(c.incomeStandards)
                .slice(0, 3)
                .map(([k, v]) => `${k.replace(/_/g, ' ')} ${v}%`);
            incomeLine = `소득: ${parts.join(' · ')}`;
        } else {
            incomeLine = `추정: 신혼·생애최초 160% / 일반 100%`;
        }

        let assetLine = '';
        if (c && c.assetStandards) {
            const a = c.assetStandards;
            const parts = [];
            if (a.부동산_만원) parts.push(`부동산 ${a.부동산_만원.toLocaleString()}만`);
            if (a.자동차_만원) parts.push(`차 ${a.자동차_만원.toLocaleString()}만`);
            if (parts.length) assetLine = `<div class="line">자산: ${parts.join(' · ')}</div>`;
        }

        return `<div class="announcement-item ${status.expired ? 'expired' : ''}">
            <div class="announcement-head">
                <div class="announcement-title">${item.name || '제목 미정'}<small>${item.divisionName || ''}</small></div>
                <div class="badge-group">${statusBadge}${analyzedBadge}</div>
            </div>
            <div class="announcement-meta">
                <div>📍 ${item.region || '-'} &nbsp;·&nbsp; 📅 ${fmtDate(item.applicationStart)} ~ ${fmtDate(item.applicationEnd)}</div>
                <div class="line">${incomeLine}</div>
                ${assetLine}
            </div>
        </div>`;
    }

    function renderHot() {
        const hotAreas = ['분당', '판교', '구리', '과천'];
        const hot = allAnnouncements
            .filter(a => !statusFor(a.applicationStart, a.applicationEnd).expired)
            .filter(a => a.region === '서울' || hotAreas.some(h => (a.name || '').includes(h)))
            .slice(0, 5);

        const el = document.getElementById('hotList');
        const count = document.getElementById('hotCount');
        if (hot.length === 0) {
            el.innerHTML = '<div class="empty">진행 중인 인기 단지가 없습니다.</div>';
            count.textContent = '';
            return;
        }
        count.textContent = `${hot.length}개`;
        el.innerHTML = hot.map(announcementItem).join('');
    }

    function renderAll() {
        let list = allAnnouncements.slice();
        if (!showExpired) {
            list = list.filter(a => !statusFor(a.applicationStart, a.applicationEnd).expired);
        }
        list = filterByRegion(list, activeRegion);
        // 정렬: 청약중 → D-n 오름차순 → 마감/미정
        list.sort((a, b) => {
            const sa = statusFor(a.applicationStart, a.applicationEnd);
            const sb = statusFor(b.applicationStart, b.applicationEnd);
            if (sa.rank !== sb.rank) return sa.rank - sb.rank;
            const ea = parseYmd(a.applicationEnd), eb = parseYmd(b.applicationEnd);
            if (ea && eb) return ea - eb;
            return 0;
        });

        const el = document.getElementById('allList');
        const count = document.getElementById('allCount');
        if (list.length === 0) {
            el.innerHTML = '<div class="empty">조건에 맞는 공고가 없습니다.</div>';
            count.textContent = '';
            return;
        }
        count.textContent = `총 ${list.length}개`;
        el.innerHTML = list.map(announcementItem).join('');
    }

    // ---------- Data fetching ----------
    async function fetchCriteria() {
        try {
            const res = await fetch('/data/criteria.json', { cache: 'no-cache' });
            if (res.ok) {
                criteria = await res.json();
            }
        } catch (e) {
            console.warn('criteria.json not available yet', e);
        }
    }

    async function fetchAnnouncements() {
        try {
            const res = await fetch('/api/proxy?page=1&perPage=100');
            const data = await res.json();
            if (data.success && Array.isArray(data.announcements)) {
                allAnnouncements = data.announcements;
            } else {
                throw new Error('Invalid response');
            }
        } catch (e) {
            console.error('fetchAnnouncements error:', e);
            document.getElementById('hotList').innerHTML = '<div class="empty">공고를 불러올 수 없습니다.</div>';
            document.getElementById('allList').innerHTML = '<div class="empty">공고를 불러올 수 없습니다.</div>';
        }
    }

    // ---------- Init ----------
    async function init() {
        // 가구원 chip
        document.querySelectorAll('#familyChips .chip').forEach(c => {
            c.addEventListener('click', () => setFamily(c.dataset.family));
        });
        // 지역 chip
        document.querySelectorAll('#regionChips .chip').forEach(c => {
            c.addEventListener('click', () => setRegion(c.dataset.region));
        });
        // 슬라이더
        const slider = document.getElementById('incomeSlider');
        slider.addEventListener('input', onSliderInput);
        // 마감 포함 토글
        document.getElementById('showExpiredToggle').addEventListener('change', e => {
            showExpired = e.target.checked;
            renderAll();
        });

        setupSlider();
        recompute();

        // 병렬 fetch (criteria + 공고)
        await Promise.all([fetchCriteria(), fetchAnnouncements()]);
        renderHot();
        renderAll();
    }

    init();
</script>
</body>
</html>
